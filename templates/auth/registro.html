<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Criar Conta — Selenio Analytics</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
<div class="login-wrap">
  <div class="login-card" style="max-width:440px">
    <div class="login-logo">
      <div class="brand-icon lg">S</div>
      <h1>Criar conta grátis</h1>
      <p>14 dias de trial sem cartão de crédito</p>
    </div>
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
      <div class="flash flash-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST" action="{{ url_for('registro') }}">
      <div class="form-section">Seus dados</div>
      <div class="field">
        <label>Seu nome</label>
        <input type="text" name="nome" required placeholder="João Silva">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" name="email" required placeholder="seu@email.com">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" name="senha" required placeholder="Mínimo 8 caracteres" minlength="8">
      </div>
      <div class="form-section">Sua empresa</div>
      <div class="field">
        <label>Nome da empresa</label>
        <input type="text" name="empresa" required placeholder="Minha Agência">
      </div>
      <div class="form-section">Plano</div>
      {% for plano in planos %}
      <label style="display:flex;align-items:center;gap:.75rem;border:1px solid #E2E8F0;border-radius:8px;padding:.75rem 1rem;margin-bottom:.5rem;cursor:pointer">
        <input type="radio" name="plano_id" value="{{ plano.id }}" {% if loop.first %}checked{% endif %}>
        <div>
          <div style="font-weight:600;font-size:14px">{{ plano.nome | capitalize }}</div>
          <div style="font-size:12px;color:#64748B">R$ {{ "%.2f"|format(plano.preco_por_assento) }}/usuário/mês · {{ plano.max_projetos }} projeto(s) · {{ plano.max_keywords }} keywords</div>
        </div>
      </label>
      {% endfor %}
      <button type="submit" class="btn btn-primary btn-full" style="margin-top:1rem">Criar conta grátis</button>
    </form>
    <div style="text-align:center;margin-top:1rem;font-size:13px;color:#64748B">
      Já tem conta? <a href="{{ url_for('login') }}">Entrar</a>
    </div>
  </div>
</div>
</body>
</html>
