name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.77.225.137
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker rm -f analytics-app
            docker run -d \
              --name analytics-app \
              --restart unless-stopped \
              --network easypanel \
              --ip 10.11.0.100 \
              --env-file /root/analytics/.env \
              -e DB_HOST=172.18.0.1 \
              easypanel/analytics/analytics
            echo "Deploy concluido"
